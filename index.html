<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notice: Certificate Status</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF3366;
            --secondary: #FF9933;
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-color: #f8fafc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Ambient background glow */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 40vw;
            height: 40vw;
            border-radius: 50%;
            filter: blur(100px);
            z-index: 0;
            animation: float 10s ease-in-out infinite alternate;
        }

        body::before {
            background: radial-gradient(circle, rgba(255,51,102,0.15) 0%, rgba(255,51,102,0) 70%);
            top: -10vw;
            left: -10vw;
        }

        body::after {
            background: radial-gradient(circle, rgba(255,153,51,0.15) 0%, rgba(255,153,51,0) 70%);
            bottom: -10vw;
            right: -10vw;
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(30px, 30px); }
        }

        .container {
            position: relative;
            z-index: 1;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 3.5rem;
            max-width: 800px;
            width: 90%;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(40px);
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logos {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 3rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
        }

        .logo-item {
            height: 90px;
            object-fit: contain;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.3));
            transition: transform 0.3s ease, filter 0.3s ease;
            animation: fadeIn 1s ease-out forwards;
            opacity: 0;
        }

        .logo-item:nth-child(1) { animation-delay: 0.2s; }
        .logo-item:nth-child(2) { animation-delay: 0.4s; }
        .logo-item:nth-child(3) { animation-delay: 0.6s; }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .logo-item:hover {
            transform: scale(1.1) translateY(-5px);
            filter: drop-shadow(0 8px 12px rgba(255, 255, 255, 0.1));
        }

        .warning-icon {
            font-size: 4.5rem;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pulse 2.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
            background: linear-gradient(to right, #ffffff, #cbd5e1);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        .message {
            font-size: 1.3rem;
            line-height: 1.8;
            color: #94a3b8;
            font-weight: 400;
            max-width: 650px;
            margin: 0 auto;
        }

        .highlight {
            color: #ffffff;
            font-weight: 600;
            background: linear-gradient(120deg, rgba(255,51,102,0.2) 0%, rgba(255,153,51,0.2) 100%);
            padding: 0.2em 0.5em;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .container::after {
            content: '';
            position: absolute;
            top: -1px; left: -1px; right: -1px; bottom: -1px;
            background: linear-gradient(45deg, var(--primary), var(--secondary), var(--primary));
            z-index: -1;
            border-radius: 25px;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .container:hover::after {
            opacity: 0.2;
        }
        
        @media (max-width: 768px) {
            .logos {
                gap: 2rem;
            }
            .logo-item {
                height: 70px;
            }
            h1 {
                font-size: 2.2rem;
            }
            .message {
                font-size: 1.15rem;
            }
            .container {
                padding: 2.5rem 1.5rem;
            }
            .warning-icon {
                font-size: 3.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logos">
            <img src="2.png" alt="Sponsor Logo 1" class="logo-item">
            <img src="EVENTLOGO.png" alt="Event Logo" class="logo-item">
            <img src="8.png" alt="Sponsor Logo 2" class="logo-item">
        </div>
        
        <div class="warning-icon">⚠️</div>
        
        <h1>Notice</h1>
        
        <p class="message">
            The certificates have been temporarily paused until <span class="highlight">all teams submit their projects</span> on Hack2Skill and complete the <span class="highlight">Google Form</span>.
        </p>
    </div>
</body>
</html>
